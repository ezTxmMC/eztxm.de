server {
    listen 80;
    server_name cdn.eztxm.de;
    root /var/www/cdn.eztxm.de;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name eztxm.de 10.204.20.20;
    root /var/www/eztxm.de/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets (images, fonts, scripts, styles, etc.)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf|mp4|webm|ogg|mp3|wav|pdf|json|xml|txt|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name repo.eztxm.de;
    root /var/www/repo.eztxm.de;
    index index.html index.htm index.php;

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }
}
